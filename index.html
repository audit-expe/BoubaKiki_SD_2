const AUDIO_FILES = ["audio/stim60_1.wav", "audio/stim60_10.wav", "audio/stim60_11.wav", "audio/stim60_12.wav", "audio/stim60_13.wav", "audio/stim60_14.wav", "audio/stim60_15.wav", "audio/stim60_16.wav", "audio/stim60_17.wav", "audio/stim60_2.wav", "audio/stim60_3.wav", "audio/stim60_4.wav", "audio/stim60_5.wav", "audio/stim60_6.wav", "audio/stim60_7.wav", "audio/stim60_8.wav", "audio/stim60_9.wav"];

function getUrlParam(name) {
  return new URLSearchParams(window.location.search).get(name) || "";
}

const participant_info = {
  prolific_id: getUrlParam("PROLIFIC_PID"),
  study_id: getUrlParam("STUDY_ID"),
  session_id: getUrlParam("SESSION_ID"),
  continuum: CONTINUUM
};

const jsPsych = initJsPsych({
  show_progress_bar: true,
  auto_update_progress_bar: false,
  on_finish: function() {
    // Fallback local si DataPipe n'est pas configuré.
    if (DATAPIPE_EXPERIMENT_ID === "PUT_YOUR_DATAPIPE_EXPERIMENT_ID_HERE") {
      jsPsych.data.get().localSave('csv', `audio_similarity_${CONTINUUM}_${participant_info.prolific_id || 'no_prolific_id'}.csv`);
    }
  }
});

const timeline = [];

timeline.push({
  type: jsPsychPreload,
  audio: AUDIO_FILES,
  message: '<div class="task-box"><p>Loading sounds...</p><p class="small">Please wait.</p></div>',
  error_message: '<div class="task-box"><p><strong>Some audio files could not be loaded.</strong></p><p>Please check that all .wav files are in the <code>audio/</code> folder.</p></div>',
  continue_after_error: false
});

timeline.push({
  type: jsPsychSurveyHtmlForm,
  preamble: `<div class="task-box"><h2>Participant information</h2></div>`,
  html: `
    <p><label>Prolific ID<br><input name="prolific_id_typed" type="text" value="${participant_info.prolific_id}" required></label></p>
    <p><label>Age<br><input name="age" type="number" min="18" max="99" required></label></p>
    <p><label>Gender<br>
      <select name="gender" required>
        <option value="" selected disabled>Choose...</option>
        <option value="female">female</option>
        <option value="male">male</option>
        <option value="non-binary">non-binary</option>
        <option value="prefer not to say">prefer not to say</option>
      </select>
    </label></p>
    <p><label>Connection to music<br>
      <select name="music_connection" required>
        <option value="" selected disabled>Choose...</option>
        <option value="musician">musician</option>
        <option value="audio professional">audio professional</option>
        <option value="neither">neither</option>
      </select>
    </label></p>

  button_label: 'Continue',
  data: { section: 'participant_information', ...participant_info }
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box">
    <h2>Audio Similarity Detection Task</h2>
    <p>You will hear two sounds, one after the other.</p>
    <p>Your task is to decide whether the two sounds are the <strong>same</strong> or <strong>different</strong>.</p>
    <p>You can click the buttons or use the keyboard:</p>
    <p><strong>Left arrow = Same</strong><br><strong>Right arrow = Different</strong></p>
    <p class="small">Please use headphones and keep your volume at a comfortable level.</p>
    <p>Press any key to start.</p>
  </div>`,
  choices: 'ALL_KEYS',
  data: { section: 'instructions', ...participant_info }
});

function responseTrial(pair) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    choices: ['ArrowLeft', 'ArrowRight'],
    stimulus: function() {
      setTimeout(() => {
        const sameBtn = document.getElementById('same-btn');
        const diffBtn = document.getElementById('different-btn');
        if (sameBtn) sameBtn.addEventListener('click', () => jsPsych.finishTrial({response: 'button_same', rt: performance.now() - jsPsych.getStartTime()}));
        if (diffBtn) diffBtn.addEventListener('click', () => jsPsych.finishTrial({response: 'button_different', rt: performance.now() - jsPsych.getStartTime()}));
      }, 0);
      return `<div class="task-box">
        <h2>Same or different?</h2>
        <div class="response-buttons">
          <button id="same-btn" class="response-button">Same<br><span class="small">← left</span></button>
          <button id="different-btn" class="response-button">Different<br><span class="small">right →</span></button>
        </div>
      </div>`;
    },
    on_finish: function(data) {
      let raw = data.response;
      let response_clean = null;
      if (raw === 'arrowleft' || raw === 'ArrowLeft' || raw === 'button_same') response_clean = 'same';
      if (raw === 'arrowright' || raw === 'ArrowRight' || raw === 'button_different') response_clean = 'different';
      data.raw_response = raw;
      data.response_clean = response_clean;
      data.correct = response_clean === pair.correct_response;
    },
    data: {
      section: 'response',
      ...participant_info,
      ...pair
    }
  };
}

const randomizedPairs = jsPsych.randomization.shuffle(TEST_TRIALS);
randomizedPairs.forEach((pair, idx) => {
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div class="fixation">+</div>',
    choices: 'NO_KEYS',
    trial_duration: FIXATION_MS,
    data: { section: 'fixation', trial_index: idx + 1, ...participant_info, ...pair }
  });
  timeline.push({
    type: jsPsychAudioKeyboardResponse,
    stimulus: pair.audio1,
    choices: 'NO_KEYS',
    trial_ends_after_audio: true,
    data: { section: 'audio1', trial_index: idx + 1, ...participant_info, ...pair }
  });
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '',
    choices: 'NO_KEYS',
    trial_duration: ITI_MS,
    data: { section: 'iti', trial_index: idx + 1, ...participant_info, ...pair }
  });
  timeline.push({
    type: jsPsychAudioKeyboardResponse,
    stimulus: pair.audio2,
    choices: 'NO_KEYS',
    trial_ends_after_audio: true,
    data: { section: 'audio2', trial_index: idx + 1, ...participant_info, ...pair }
  });
  timeline.push(responseTrial(pair));
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box"><h2>Thank you!</h2><p>Your data are being saved.</p></div>`,
  choices: 'NO_KEYS',
  trial_duration: 1000,
  data: { section: 'end_screen', ...participant_info }
});

// DataPipe save. Remplir DATAPIPE_EXPERIMENT_ID avant mise en ligne.
if (DATAPIPE_EXPERIMENT_ID !== "PUT_YOUR_DATAPIPE_EXPERIMENT_ID_HERE") {
  timeline.push({
    type: jsPsychPipe,
    action: "save",
    experiment_id: DATAPIPE_EXPERIMENT_ID,
    filename: `audio_similarity_${CONTINUUM}_${participant_info.prolific_id || 'no_prolific_id'}_${Date.now()}.csv`,
    data_string: () => jsPsych.data.get().csv()
  });
}

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box"><h2>Finished</h2><p>You can now return to Prolific.</p></div>`,
  choices: 'NO_KEYS',
  trial_duration: 1000,
  on_finish: function() {
    if (PROLIFIC_COMPLETION_URL !== "PUT_YOUR_PROLIFIC_COMPLETION_URL_HERE") {
      window.location.href = PROLIFIC_COMPLETION_URL;
    }
  },
  data: { section: 'redirect', ...participant_info }
});

jsPsych.run(timeline);

</script>
